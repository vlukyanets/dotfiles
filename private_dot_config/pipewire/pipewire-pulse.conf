context.properties = {
    log.level = 0
}

context.modules = [
    { name = libpipewire-module-rt
        args = {
            nice.level   = -11
            rt.prio      = 88
            rt.time.soft = 200000
            rt.time.hard = 200000
        }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-link-factory }
    { name = libpipewire-module-protocol-pulse
        args = {
            # Expose PulseAudio socket so legacy apps find it
            server.address = [ "unix:native" ]

            # Pulse quirk: some apps need explicit rate negotiation
            pulse.default.req   = "128/48000"
            pulse.min.req       = "32/48000"
            pulse.default.frag  = "96000/48000"
            pulse.default.tlength = "96000/48000"
            pulse.min.quantum   = "32/48000"
        }
    }
]

stream.properties = {
    # High-quality resampler (slower but fewer artifacts on rate conversion)
    resample.quality = 10
    resample.disable = false
}
