monitor.bluez.properties = {
    # Enable all codecs — prefer high quality
    bluez5.enable-sbc        = true
    bluez5.enable-aac        = true
    bluez5.enable-aptx       = true
    bluez5.enable-aptx-hd    = true
    bluez5.enable-ldac       = true
    bluez5.enable-opus-pro   = true

    # Codec preference order (highest quality first)
    bluez5.codecs = [ ldac aptx_hd aptx aac sbc_xq sbc ]

    # Fix auto-switching to low-quality HFP when mic is used (e.g. in calls)
    bluez5.autoswitch-profile = true

    # Hardware volume control passthrough
    bluez5.hw-volume = true

    # Increase LDAC bitrate (330=standard, 492=balanced, 660=quality, 990=best)
    bluez5.default.rate = 48000
}
